<!doctype html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add Vehicle | GoRido</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>tailwind.config = { darkMode: 'class' }</script>
    <style>
        .file-drop {
            border: 2px dashed #475569;
            transition: border-color 0.2s;
        }
        .file-drop:hover, .file-drop.dragover {
            border-color: #facc15;
        }
        .file-drop input[type="file"] {
            position: absolute;
            inset: 0;
            opacity: 0;
            cursor: pointer;
            width: 100%;
            height: 100%;
        }
    </style>
</head>
<body
        class="flex items-start sm:items-center justify-center min-h-screen px-4 sm:px-6 md:px-10 lg:px-16 py-10 sm:py-6 transition-colors duration-300 bg-slate-200 dark:bg-slate-950">

<div class="w-full max-w-6xl mx-auto space-y-6">

    <div
            class="relative bg-white dark:bg-slate-900 rounded-2xl shadow-2xl p-8 overflow-hidden">

        <div class="space-y-1">
            <h2
                    class="text-3xl font-bold tracking-tight text-slate-800 dark:text-white">
                Add Vehicle
            </h2>

            <p
                    class="text-sm text-slate-500 dark:text-slate-400 max-w-xl">
                Complete your profile details to get approved and start
                accepting ride requests.
            </p>
        </div>

        <div
                class="mt-6 flex items-center justify-between text-xs text-slate-500 dark:text-slate-400">

            <nav>
                Home
                <span class="mx-1">/</span>
                User
                <span class="mx-1">/</span>
                <span
                        class="text-slate-700 dark:text-slate-300 font-medium">
                            Driver
                        </span>
                <span class="mx-1">/</span>
                <span
                        class="text-slate-700 dark:text-slate-300 font-medium">
                            Add Vehicle
                        </span>
            </nav>

        </div>

        <div
                class="absolute bottom-0 left-0 w-full h-1 bg-yellow-400"></div>

    </div>

    <form onsubmit="vehicleRegi(event)" novalidate class="space-y-6">

        <!-- vehicle -->
        <div class="bg-white dark:bg-slate-900 rounded-2xl shadow-2xl p-8 space-y-5">

            <h3 class="text-lg font-bold text-slate-800 dark:text-white border-b border-slate-300 dark:border-slate-600 pb-2">
                Vehicle Details
            </h3>

            <!-- Vehicle Num -->
            <div>
                <label
                        class="block mb-1 text-sm text-slate-600 dark:text-slate-300">Vehicle
                    Number</label>
                <input id="vehicle_number" type="text"
                       placeholder="e.g. CAB-1234"
                       class="w-full px-4 py-3 border border-transparent rounded-lg bg-slate-200 dark:bg-slate-800 text-slate-900 dark:text-white focus:outline-none focus:ring-2 focus:ring-yellow-400">
            </div>

            <!-- Insurance Num Insurance ExpD -->
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                <div>
                    <label
                            class="block mb-1 text-sm text-slate-600 dark:text-slate-300">Insurance
                        Number</label>
                    <input id="insurance_number" type="text"
                           placeholder="e.g. INS-2024-XXXXX"
                           class="w-full px-4 py-3 border border-transparent rounded-lg bg-slate-200 dark:bg-slate-800 text-slate-900 dark:text-white focus:outline-none focus:ring-2 focus:ring-yellow-400">
                </div>
                <div>
                    <label
                            class="block mb-1 text-sm text-slate-600 dark:text-slate-300">Insurance
                        Expiry Date</label>
                    <input id="insurance_exp_date" type="date"
                           class="w-full px-4 py-3 border border-transparent rounded-lg bg-slate-200 dark:bg-slate-800 text-slate-900 dark:text-white focus:outline-none focus:ring-2 focus:ring-yellow-400">
                </div>
            </div>

            <div class="grid grid-cols-1 md:grid-cols-3 gap-4">

                <!-- Type -->
                <div>
                    <label class="block mb-1 text-sm text-slate-600 dark:text-slate-300">
                        Type
                    </label>
                    <select id="vehicle_type"
                            class="w-full px-4 py-3 border border-transparent rounded-lg bg-slate-200 dark:bg-slate-800 text-slate-900 dark:text-white focus:outline-none focus:ring-2 focus:ring-yellow-400 appearance-none">
                        <option value="" disabled selected>Select type</option>
                    </select>
                </div>

                <!-- Brand -->
                <div>
                    <label class="block mb-1 text-sm text-slate-600 dark:text-slate-300">
                        Brand
                    </label>
                    <select disabled id="vehicle_brand"
                            class="w-full px-4 py-3 border border-transparent rounded-lg bg-slate-200 dark:bg-slate-800 text-slate-900 dark:text-white focus:outline-none focus:ring-2 focus:ring-yellow-400 appearance-none">
                        <option value="" disabled selected>Select brand</option>
                    </select>
                </div>

                <!-- Model -->
                <div>
                    <label class="block mb-1 text-sm text-slate-600 dark:text-slate-300">
                        Model
                    </label>
                    <input id="model" type="text"
                           placeholder="e.g. Corolla"
                           class="w-full px-4 py-3 border border-transparent rounded-lg bg-slate-200 dark:bg-slate-800 text-slate-900 dark:text-white focus:outline-none focus:ring-2 focus:ring-yellow-400">
                </div>

            </div>

            <!-- Model Colour -->
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                <div>
                    <label class="block mb-1 text-sm text-slate-600 dark:text-slate-300">
                        Number of Passengers
                    </label>
                    <select disabled id="no_of_passengers"
                            class="w-full px-4 py-3 border border-transparent rounded-lg bg-slate-200 dark:bg-slate-800 text-slate-900 dark:text-white focus:outline-none focus:ring-2 focus:ring-yellow-400 appearance-none">
                        <option value="" disabled selected>Select passengers</option>
                    </select>
                </div>
                <div>
                    <label
                            class="block mb-1 text-sm text-slate-600 dark:text-slate-300">Colour</label>
                    <select id="colour"
                            class="w-full px-4 py-3 border border-transparent rounded-lg bg-slate-200 dark:bg-slate-800 text-slate-900 dark:text-white focus:outline-none focus:ring-2 focus:ring-yellow-400 appearance-none">
                        <option disabled selected>Select colour</option>
                    </select>
                </div>
            </div>

            <!-- Vehicle Book Insurance Photos -->
            <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
                <div>
                    <label
                            class="block mb-1 text-sm text-slate-600 dark:text-slate-300">Vehicle
                        Photo</label>
                    <div
                            class="file-drop relative rounded-lg bg-slate-200 dark:bg-slate-800 overflow-hidden"
                            id="wrap-vehicle">
                        <input type="file" accept="image/*"
                               onchange="previewFile(this,'prev-vehicle','wrap-vehicle')">
                        <div
                                class="flex flex-col items-center justify-center py-5 px-3 text-center"
                                id="label-vehicle">
                            <svg class="w-7 h-7 text-slate-400 mb-1"
                                 fill="none" stroke="currentColor"
                                 viewBox="0 0 24 24">
                                <path stroke-linecap="round"
                                      stroke-linejoin="round"
                                      stroke-width="1.8"
                                      d="M3 7h18M3 7l2-3h14l2 3M3 7v10a2 2 0 002 2h14a2 2 0 002-2V7M9 17v-4m6 4v-4" />
                            </svg>
                            <span
                                    class="text-xs text-slate-500 dark:text-slate-400">Click
                                        or drag to upload</span>
                        </div>
                        <img id="prev-vehicle"
                             class="hidden w-full h-24 object-cover" alt>
                    </div>
                </div>
                <div>
                    <label
                            class="block mb-1 text-sm text-slate-600 dark:text-slate-300">Vehicle
                        Book Photo</label>
                    <div
                            class="file-drop relative rounded-lg bg-slate-200 dark:bg-slate-800 overflow-hidden"
                            id="wrap-book">
                        <input type="file" accept="image/*"
                               onchange="previewFile(this,'prev-book','wrap-book')">
                        <div
                                class="flex flex-col items-center justify-center py-5 px-3 text-center"
                                id="label-book">
                            <svg class="w-7 h-7 text-slate-400 mb-1"
                                 fill="none" stroke="currentColor"
                                 viewBox="0 0 24 24">
                                <path stroke-linecap="round"
                                      stroke-linejoin="round"
                                      stroke-width="1.8"
                                      d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z" />
                            </svg>
                            <span
                                    class="text-xs text-slate-500 dark:text-slate-400">Click
                                        or drag to upload</span>
                        </div>
                        <img id="prev-book"
                             class="hidden w-full h-24 object-cover" alt>
                    </div>
                </div>
                <div>
                    <label
                            class="block mb-1 text-sm text-slate-600 dark:text-slate-300">Insurance
                        Photo</label>
                    <div
                            class="file-drop relative rounded-lg bg-slate-200 dark:bg-slate-800 overflow-hidden"
                            id="wrap-insurance">
                        <input type="file" accept="image/*"
                               onchange="previewFile(this,'prev-insurance','wrap-insurance')">
                        <div
                                class="flex flex-col items-center justify-center py-5 px-3 text-center"
                                id="label-insurance">
                            <svg class="w-7 h-7 text-slate-400 mb-1"
                                 fill="none" stroke="currentColor"
                                 viewBox="0 0 24 24">
                                <path stroke-linecap="round"
                                      stroke-linejoin="round"
                                      stroke-width="1.8"
                                      d="M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.955 11.955 0 01-8.618 3.04A12.02 12.02 0 003 9c0 5.591 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.042-.133-2.052-.382-3.016z" />
                            </svg>
                            <span
                                    class="text-xs text-slate-500 dark:text-slate-400">Click
                                        or drag to upload</span>
                        </div>
                        <img id="prev-insurance"
                             class="hidden w-full h-24 object-cover" alt>
                    </div>
                </div>
            </div>

            <div
                    class="flex items-center gap-2 text-xs text-slate-500 dark:text-slate-400 mt-2 justify-center">
                <svg class="w-4 h-4 text-yellow-400" fill="none"
                     stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round"
                          stroke-width="2"
                          d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z" />
                </svg>
                <span> Upload images in <span
                        class="font-medium text-slate-700 dark:text-slate-300">JPG,
                                JPEG, or PNG</span> format only. </span>
            </div>

        </div>

        <div class="space-y-3 mt-4">
            <p id="msg"
               class="text-sm text-center hidden text-red-600"></p>

            <button type="submit"
                    class="w-full py-3 font-semibold text-black transition bg-yellow-400 rounded-lg hover:bg-yellow-300">
                Submit Application
            </button>
        </div>

    </form>
</div>

<script>
    function previewFile(input, previewId, wrapperId) {
    const file = input.files[0];
    if (!file) return;

    const labelKey = wrapperId.replace('wrap-', '');
    const label = document.getElementById('label-' + labelKey);

    if (label) {
        label.innerHTML = `
            <div class="text-center">
                <p class="text-xs text-yellow-400 font-semibold">Uploaded successfully</p>
                <p class="text-xs text-slate-300 mt-1">${file.name}</p>
            </div>`;
    }
    }

    document.querySelectorAll('.file-drop').forEach(el => {
        el.addEventListener('dragover', e => { e.preventDefault(); el.classList.add('dragover'); });
        el.addEventListener('dragleave', () => el.classList.remove('dragover'));
        el.addEventListener('drop', e => {
            e.preventDefault();
            el.classList.remove('dragover');
            const input = el.querySelector('input[type="file"]');
            input.files = e.dataTransfer.files;
            input.dispatchEvent(new Event('change'));
        });
    });

    window.onload = function () {
        if (typeof loadVehicleOptions === 'function') loadVehicleOptions();
    };
</script>
<script src="/Js/addvehicle.js" defer></script>
</body>
</html>
